<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
    }

    body {
        background: url(27471.jpg) no-repeat center;
        background-size: cover;
        height: 100vh;
        display: grid;
        place-items: center;
    }

    #road {
        background: url(road.png) repeat-y;
        height: 1200vh;
        width: 50vw;
        position: relative;
        top: -80vh;
        z-index: -9;
    }

    #start {
        position: absolute;
        z-index: 100;
        font-size: 2rem;
        background-color: rgb(245, 99, 99);
        color: white;
        padding: 5px;
        border-radius: 20px;
        cursor: pointer;
    }

    #score {
        position: absolute;
        top: 20px;
        left: 20px;
        font-size: 2rem;
        padding: 5px;
        background-color: white;
        border-radius: 20px;
    }

    #enemycar1, #enemycar2, #enemycar3, #enemycar4 {
        position: relative;
        width: 100px;
        height: 100px;
        z-index: 1001;
    }

    #enemycar1 { left: 310px; }
    #enemycar2 { left: 100px; }
    #enemycar3 { left: -100px; }
    #enemycar4 { left: -300px; top: -250px; }

    .ecarimg {
        width: 80px;
        border: 2px solid red;
    }

    .mycarimg {
        border: 2px solid red;
        width: 80px;
    }

    #mycar {
        width: 100px;
        height: 100px;
        position: relative;
        top: 15vh;
    }

    @keyframes ecar1 {
        0% { top: -30vh; }
        100% { top: 100vh; }
    }

    @keyframes ecar2 {
        0% { top: -50vh; }
        100% { top: 100vh; }
    }

    @keyframes ecar3 {
        0% { top: -60vh; }
        100% { top: 100vh; }
    }

    @keyframes ecar4 {
        0% { top: -80vh; }
        100% { top: 100vh; }
    }

    @keyframes roadanimation {
        0% { top: -1100vh; }
        100% { top: -200vh; }
    }

    /* Arrow Controls */
    #controls {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 2000;
    }

    #controls button {
        width: 50px;
        height: 50px;
        font-size: 20px;
        margin: 5px;
        border: none;
        border-radius: 10px;
        background: rgba(0,0,0,0.6);
        color: white;
        cursor: pointer;
    }
</style>

<body>

    <div id="score">Score : 0</div>
    <button id="start">Start</button>

    <div>
        <div id="enemycar1"><img id="ecarimg1" class="ecarimg" src="car2.png"></div>
        <div id="enemycar2"><img id="ecarimg2" class="ecarimg" src="car3.png"></div>
        <div id="enemycar3"><img id="ecarimg3" class="ecarimg" src="car2.png"></div>
        <div id="enemycar4"><img id="ecarimg4" class="ecarimg" src="car3.png"></div>
    </div>

    <div id="mycar"><img id="mycarimg" class="mycarimg" src="car1.png"></div>
    <div id="road"></div>

    <!-- Arrow Buttons -->
    <div id="controls">
        <button onclick="moveUp()">⬆</button>
        <div>
            <button onclick="moveLeft()">⬅</button>
            <button onclick="moveDown()">⬇</button>
            <button onclick="moveRight()">➡</button>
        </div>
    </div>

</body>

<script>
    document.getElementById("start").addEventListener("click", function () {

        document.getElementById("start").style.display = 'none'
        document.getElementById("road").style.animation = 'roadanimation 20s linear infinite'

        setInterval(() => {
            num = Math.floor(Math.random() * (350 - 230 + 1) + 230)
            document.getElementById("enemycar1").style.left = `${num}px`
        }, 3000)

        setInterval(() => {
            num = Math.floor(Math.random() * (150 - 50 + 1) + 50)
            document.getElementById("enemycar2").style.left = `${num}px`
        }, 6000)

        setInterval(() => {
            num = Math.floor(Math.random() * (-50 + 140 + 1) - 140)
            document.getElementById("enemycar3").style.left = `${num}px`
        }, 5000)

        setInterval(() => {
            num = Math.floor(Math.random() * (-220 + 330 + 1) - 330)
            document.getElementById("enemycar4").style.left = `${num}px`
        }, 4000)

        document.getElementById("enemycar1").style.animation = 'ecar1 3s linear infinite'
        document.getElementById("enemycar2").style.animation = 'ecar2 6s linear infinite'
        document.getElementById("enemycar3").style.animation = 'ecar3 5s linear infinite'
        document.getElementById("enemycar4").style.animation = 'ecar4 4s linear infinite'

        window.t = 15
        window.l = 0

        window.addEventListener("keydown", function (x) {
            if (x.keyCode == 87) t -= 3
            if (x.keyCode == 65) l -= 1
            if (x.keyCode == 83) t += 3
            if (x.keyCode == 68) l += 1

            document.getElementById("mycar").style.top = `${t}vh`
            document.getElementById("mycar").style.left = `${l}vw`
        })

        n = 0
        setInterval(() => {
            document.getElementById("score").innerText = `Score : ${n}`
            n++

            var ecar1 = document.getElementById("ecarimg1").getBoundingClientRect();
            var ecar2 = document.getElementById("ecarimg2").getBoundingClientRect();
            var ecar3 = document.getElementById("ecarimg3").getBoundingClientRect();
            var ecar4 = document.getElementById("ecarimg4").getBoundingClientRect();
            var mycar = document.getElementById("mycarimg").getBoundingClientRect();

            function crash(a, b) {
                return (a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top)
            }

            if (mycar.left < 450 || mycar.right > 1130 || mycar.top < 20 || mycar.bottom > 690 ||
                crash(ecar1, mycar) || crash(ecar2, mycar) ||
                crash(ecar3, mycar) || crash(ecar4, mycar)) {

                setTimeout(() => {
                    alert("GAME OVER!\n\nThis car game developed and designed by Ajmal Abdulrahimzai")
                })
                location.reload()
            }

        }, 100)
    })

    // Arrow Controls Functions
    function moveUp() {
        t -= 3
        document.getElementById("mycar").style.top = `${t}vh`
    }

    function moveDown() {
        t += 3
        document.getElementById("mycar").style.top = `${t}vh`
    }

    function moveLeft() {
        l -= 1
        document.getElementById("mycar").style.left = `${l}vw`
    }

    function moveRight() {
        l += 1
        document.getElementById("mycar").style.left = `${l}vw`
    }
</script>

</html>
